services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: strong_pass
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_NAME: my-app
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      APP_NAME: my-app
      BACKEND_URL: "http://backend:5000"
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - app_network
    restart: unless-stopped

volumes:
  pg_data:

networks:
  app_network:
    driver: bridge